[pytest]
addopts = --ignore=tests/test_chainlink_streams_live.py --ignore=tests/test_rtds_chainlink_live.py --ignore=tests/test_rtds_live.py --ignore=tests/test_integration.py
markers =
    p0: Critical integration tests — must pass before any live deployment
    p1: Important integration tests — high value but non-blocking for canary
    live: Tests that make real network calls (Polymarket + Hyperliquid APIs); excluded from default CI run
    live_clob: Authenticated CLOB smoke test — places+cancels a real non-fillable order; requires POLY_PRIVATE_KEY
